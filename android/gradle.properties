org.gradle.jvmargs=-Xmx4G
android.useAndroidX=true
android.enableJetifier=true

# Kotlin incremental compile breaks when the project and Pub cache are on different
# Windows drive letters (e.g. E:\ app vs C:\Users\...\Pub\Cache). See KT-40566 / RelocatableFileToPathConverter.
kotlin.incremental=false
